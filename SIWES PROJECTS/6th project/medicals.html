<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<link rel="stylesheet" href="styles.css">
<body>
  <div class="page">
    <div class="container">
      <ul class="nav-bar">
        <li><a href="personal-details.html" >Personal</a></li>
        <li><a href="medicals.html" class="active">Medical</a></li>
        <li><a href="guardians.html">Guardian</a></li>
        <li><a href="academic-background.html">Academics</a></li>
      </ul>
      <header>MEDICAL FORM</header>
      <form action="guardians.html" method="get" >
        <div class="form-group">
          <label for="height">Height *</label>
        <input type="number" id="height" name="height" min="1" step="0.1" required>
         </div>

           <div class="form-group">
            <label for="weight">Weight(kg)*</label>
        <input type="number" id="weight" name="weight" min="1" step="0.1" required>
           </div>

        <div class="form-group">
          <label>Blood-group *</label>
        <div class="radio-group">
    <label><input type="radio" name="blood-group" value="a"required>A </label>
   <label><input type="radio" name="blood-group" value="b">B </label>
   <label><input type="radio" name="blood-group" value="ab">AB</label>
   <label><input type="radio" name="blood-group" value="o">O</label>
  </div>
        </div>

        <div class="form-group">
          <label>Genotype *</label>
        <div class="radio-group">
    <label><input type="radio" name="genotype" value="aa" required>AA </label>
   <label><input type="radio" name="genotype" value="as">AS </label>
   <label><input type="radio" name="genotype" value="ss">SS</label>
   <label><input type="radio" name="genotype" value="sc">SC</label>
   <label><input type="radio" name="genotype" value="ac">AC</label>
   <label><input type="radio" name="genotype" value="cc">CC</label>
  </div>
        </div>

         <div class="form-group">
          <label for="pulse">Pulse (BPM) *</label>
        <input type="text" id="pulse" required>
         </div> 

         <div class="form-group">
          <label for="blood-pressure">Blood Pressure *</label>
        <input type="text" id="blood-pressure" required>
         </div> 

         <div class="form-group">
          <label for="emergency">Emergency Contact *</label>
        <input type="text" id="emergency" required><br>
         </div> 

         <a href="guardians.html"><button type="submit">Submit</button></a>
      </form>
    </div>
  </div>
  </div>
</body>
</html>
