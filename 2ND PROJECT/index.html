<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <div class="card">
        <p class="card-title-1"> Contact Us </p>
      <div class="form-row">
        <div class="form-group-1">
          <label for="firstname"> First Name <span> * </span> </label><br>
          <input type="text" id="firstname">
        </div>
        <div class="form-group-2">
          <label for="lastname"> Last Name <span> * </span> </label><br>
          <input type="text" id="lastname">
        </div>
      </div>  
        <div class="form-group">
          <label> Email Address <span> * </span> </label><br>
          <input type="email">
        </div>
        <div class="form-group">
          <label> Query Type <span> * </span> </label><br>
          <div class="radio-group">
            <label class="radio-options">
              <input type="radio" name="query"> General Enquiry
            </label>
            <label class="radio-options">
              <input type="radio" name="query"> Support Request
              </label>
          </div>
        </div>
        <div class="form-group">
          <label> Message <span> * </span> </label><br>
          <textarea> </textarea>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="consent">
          <label for="consent"> I consent to beng contacted by the team </label>
        </div>
      <button class="submit-btn"> Submit </button>
      
    </div>
  </div>
  
</body>
</html>
